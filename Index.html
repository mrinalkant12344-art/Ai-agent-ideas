<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇮🇳 India AI Startup Ideas</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
padding:40px 20px;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
font-size:3rem;
margin-bottom:10px;
}

.subtitle{
color:#cbd5e1;
margin-bottom:30px;
}

.tabs{
display:flex;
gap:10px;
overflow:auto;
margin-bottom:20px;
}

.tab{
padding:12px 20px;
border:none;
border-radius:999px;
background:#1e293b;
color:white;
cursor:pointer;
}

.tab.active{
background:#3b82f6;
}

.glass{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:24px;
}

.idea-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:18px;
}

.card h3{
margin-bottom:10px;
color:#93c5fd;
}
</style>
</head>

<body>

<div class="container">

<h1>🇮🇳 India AI Startup Ideas</h1>

<p class="subtitle">
42 India-first AI startup ideas built around real daily pain points.
</p>

<div class="tabs" id="tabs"></div>

<div class="glass">
<div id="content"></div>
</div>

</div>

<script>

const data = {

Healthcare:[
{
title:"AI Rural Health Assistant",
desc:"Voice-based multilingual AI healthcare helper for villages."
},
{
title:"Prescription Explainer",
desc:"Converts medical prescriptions into simple local language."
}
],

Education:[
{
title:"AI Tuition Agent",
desc:"Personalized AI tutor for Indian students."
},
{
title:"Spoken English Coach",
desc:"Realtime AI speaking coach for tier-2 and tier-3 cities."
}
],

Agriculture:[
{
title:"Crop Disease Scanner",
desc:"Detect crop diseases using smartphone images."
},
{
title:"Smart Mandi Predictor",
desc:"Predict best mandi prices for farmers."
}
],

Finance:[
{
title:"AI GST Helper",
desc:"Simplifies GST filing for Indian businesses."
},
{
title:"Loan Eligibility AI",
desc:"Alternative credit scoring for gig workers."
}
]

};

const tabs=document.getElementById("tabs");
const content=document.getElementById("content");

function render(category){

const ideas=data[category];

content.innerHTML=`
<h2>${category}</h2>

<div class="idea-grid">
${ideas.map(i=>`
<div class="card">
<h3>${i.title}</h3>
<p>${i.desc}</p>
</div>
`).join("")}
</div>
`;

document.querySelectorAll(".tab").forEach(t=>{
t.classList.remove("active");
});

document.getElementById(category).classList.add("active");
}

Object.keys(data).forEach((category,index)=>{

const btn=document.createElement("button");

btn.className="tab";
btn.id=category;
btn.innerText=category;

btn.onclick=()=>render(category);

tabs.appendChild(btn);

if(index===0){
render(category);
}

});

</script>

</body>
</html>
